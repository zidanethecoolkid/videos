<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    background: #000;
    overflow: hidden;
    width: 100vw; height: 100vh; height: 100dvh;
    font-family: 'MS Sans Serif', 'Microsoft Sans Serif', Tahoma, Geneva, sans-serif;
    font-size: 11px;
    user-select: none; -webkit-user-select: none;
    cursor: default;
    touch-action: none;
    overscroll-behavior: none;
  }

  /* ============================================
     CUSTOMIZE YOUR BACKGROUND HERE
     Options:
       Solid color:  background: #008080;
       Dark:         background: #0a0a0a;
       Image:        background: url('https://your-image.jpg') center/cover no-repeat;
     ============================================ */

  body::after {
    content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 99999;
    background: repeating-linear-gradient(0deg, rgba(0,0,0,0.03) 0px, rgba(0,0,0,0.03) 1px, transparent 1px, transparent 3px);
    mix-blend-mode: multiply;
  }

  .desktop-icon {
    position: absolute;
    display: flex; flex-direction: column; align-items: center;
    gap: 4px; padding: 6px;
    cursor: default;
    -webkit-tap-highlight-color: transparent;
    z-index: 1;
  }
  .desktop-icon .icon-wrap { padding: 2px; align-self: flex-start; margin-left: 35px; }
  .desktop-icon.selected .icon-wrap,
  .desktop-icon.selected .icon-label { background: #000080; }
  .desktop-icon .icon-label {
    color: white; text-align: center; line-height: 16px;
    padding: 2px 4px;
    text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
    white-space: nowrap; font-size: 11px;
  }
  .desktop-icon.selected .icon-label { text-shadow: none; }

  .window {
    position: fixed; display: flex; flex-direction: column;
    background: #c0c0c0;
    border-top: 2px solid #dfdfdf; border-left: 2px solid #dfdfdf;
    border-right: 2px solid #404040; border-bottom: 2px solid #404040;
    box-shadow: inset 1px 1px 0 #fff, inset -1px -1px 0 #808080;
  }

  .title-bar {
    background: linear-gradient(90deg, #000080, #1084d0);
    padding: 3px 4px; display: flex; align-items: center; gap: 4px;
    flex-shrink: 0; min-height: 28px; position: relative;
  }
  .title-bar .title-text {
    color: white; font-weight: bold; font-size: 11px; flex: 1;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }

  .win-btn {
    background: #c0c0c0; border: none;
    border-top: 1px solid #fff; border-left: 1px solid #fff;
    border-right: 1px solid #404040; border-bottom: 1px solid #404040;
    padding: 1px; cursor: pointer;
    min-width: 16px; min-height: 14px;
    display: flex; align-items: center; justify-content: center;
    outline: none; font-size: 10px; line-height: 1;
    -webkit-tap-highlight-color: transparent;
  }
  .win-btn:active {
    border-top: 1px solid #404040; border-left: 1px solid #404040;
    border-right: 1px solid #fff; border-bottom: 1px solid #fff;
  }
  .close-btn { min-width: 28px; min-height: 24px; font-size: 14px; }

  .player-area {
    flex: 1; background: #000; margin: 2px;
    border-top: 1px solid #808080; border-left: 1px solid #808080;
    border-right: 1px solid #dfdfdf; border-bottom: 1px solid #dfdfdf;
    display: flex; align-items: center; justify-content: center;
  }
  .player-area video { max-width: 100%; max-height: 100%; display: block; }

  .player-controls {
    display: flex; align-items: center; gap: 3px;
    padding: 4px 6px; flex-shrink: 0; background: #c0c0c0;
  }
  .player-controls .win-btn { min-width: 32px; min-height: 28px; font-size: 14px; }
  .progress-track {
    flex: 1; height: 16px; background: white;
    border: 1px solid #808080; border-right-color: #dfdfdf; border-bottom-color: #dfdfdf;
    position: relative; cursor: pointer;
  }
  .progress-fill { height: 100%; background: #000080; width: 0%; pointer-events: none; }
  .time-display { font-size: 11px; min-width: 75px; text-align: center; font-variant-numeric: tabular-nums; }
  .status-bar { padding: 2px 6px; font-size: 11px; border-top: 1px solid #808080; color: #404040; flex-shrink: 0; }

  .taskbar {
    position: fixed; bottom: 0; left: 0; right: 0; height: 40px;
    background: #c0c0c0; border-top: 2px solid #dfdfdf;
    display: flex; align-items: center; padding: 2px; gap: 2px; z-index: 9998;
  }
  .start-btn {
    font-weight: bold; padding: 2px 10px; height: 32px; font-size: 12px;
    display: flex; align-items: center; gap: 4px; font-family: inherit;
    -webkit-tap-highlight-color: transparent;
  }
  .taskbar-divider { width: 1px; height: 28px; border-left: 1px solid #808080; border-right: 1px solid #dfdfdf; margin: 0 2px; }
  .taskbar-items { flex: 1; display: flex; gap: 2px; overflow: hidden; }
  .taskbar-item {
    max-width: 140px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    height: 32px; padding: 2px 8px; font-family: inherit; font-size: 11px;
    display: flex; align-items: center; gap: 4px; -webkit-tap-highlight-color: transparent;
  }
  .taskbar-item.active {
    border-top: 1px solid #404040; border-left: 1px solid #404040;
    border-right: 1px solid #fff; border-bottom: 1px solid #fff;
  }
  .systray {
    border-top: 1px solid #808080; border-left: 1px solid #808080;
    border-right: 1px solid #dfdfdf; border-bottom: 1px solid #dfdfdf;
    padding: 2px 8px; height: 32px;
    display: flex; align-items: center; gap: 6px; font-size: 11px;
  }

  .start-menu {
    position: fixed; bottom: 40px; left: 0; width: 280px;
    background: #c0c0c0;
    border-top: 2px solid #dfdfdf; border-left: 2px solid #dfdfdf;
    border-right: 2px solid #404040; border-bottom: 2px solid #404040;
    z-index: 10000; display: none;
    box-shadow: inset 1px 1px 0 #fff, inset -1px -1px 0 #808080;
  }
  .start-menu.open { display: block; }
  .start-menu .sidebar {
    background: #000080; width: 22px;
    position: absolute; left: 2px; top: 2px; bottom: 2px;
    display: flex; align-items: flex-end; justify-content: center; padding-bottom: 6px;
  }
  .start-menu .sidebar span {
    color: #c0c0c0; font-size: 14px; font-weight: bold;
    writing-mode: vertical-rl; transform: rotate(180deg); letter-spacing: 2px;
  }
  .start-menu .menu-items { margin-left: 24px; padding: 2px 0; }
  .start-menu .menu-item {
    padding: 8px; display: flex; align-items: center; gap: 8px; font-size: 11px;
    -webkit-tap-highlight-color: transparent;
  }
  .start-menu .menu-item:hover, .start-menu .menu-item:active { background: #000080; color: white; }
  .start-menu .menu-sep { border-top: 1px solid #808080; border-bottom: 1px solid #dfdfdf; margin: 2px 4px; }

  .drag-handle { display: none; }

  @media (max-width: 768px) {
    .desktop-icon .icon-wrap svg { width: 44px; height: 44px; }
    .desktop-icon .icon-label { font-size: 12px; }
    .title-bar { min-height: 38px; padding: 4px 6px; }
    .title-bar .title-text { font-size: 13px; }
    .close-btn { min-width: 38px; min-height: 32px; font-size: 18px; }
    .player-controls .win-btn { min-width: 40px; min-height: 34px; font-size: 16px; }
    .progress-track { height: 22px; }
    .time-display { font-size: 10px; min-width: 65px; }
    .drag-handle {
      display: block; width: 40px; height: 4px;
      background: rgba(255,255,255,0.4); border-radius: 2px;
      position: absolute; top: 3px; left: 50%; transform: translateX(-50%);
      pointer-events: none;
    }
  }
</style>
</head>

<script>
// =====================================================
//  CUSTOMIZE HERE
// =====================================================

// YOUR 3 VIDEOS — change names and URLs
var VIDEOS = [
  { id: "v1", name: "centralceealbumteaserparty.mp4", url: "https://res.cloudinary.com/dbuxi5yul/video/upload/v1773074547/OUTPUT_7_exhnwi.mp4" },
  { id: "v2", name: "24hoursinnyc.mp4", url: "https://res.cloudinary.com/dbuxi5yul/video/upload/v1773074522/OUTPUT_15_ynyp9k.mp4" },
  { id: "v3", name: "sohosidequest.mp4", url: "https://res.cloudinary.com/dbuxi5yul/video/upload/v1773074506/OUTPUT_22_wnogyv.mp4" },
];

// YOUR PHOTOGRAPHY SITE URL — where the photography.zip icon links to
var PHOTOGRAPHY_URL = "https://your-photography-site.vercel.app";

// =====================================================
//  ENGINE — no need to edit below
// =====================================================
var zCounter = 100;
var activeWindowId = null;
var openWindows = {};
var startOpen = false;
var isMobile = function() { return window.innerWidth <= 768; };

var videoSVG = '<svg width="40" height="40" viewBox="0 0 32 32" fill="none"><rect x="3" y="6" width="26" height="20" rx="1" fill="#c0c0c0" stroke="#404040"/><rect x="5" y="8" width="22" height="14" fill="#000080"/><polygon points="14,11 14,19 21,15" fill="white"/><rect x="5" y="23" width="22" height="2" fill="#808080"/></svg>';
var zipSVG = '<svg width="40" height="40" viewBox="0 0 32 32" fill="none"><rect x="6" y="3" width="20" height="26" rx="1" fill="#ffffc0" stroke="#808000"/><rect x="14" y="3" width="4" height="2" fill="#808000"/><rect x="14" y="7" width="4" height="2" fill="#808000"/><rect x="14" y="11" width="4" height="2" fill="#808000"/><rect x="14" y="15" width="4" height="2" fill="#808000"/><rect x="12" y="19" width="8" height="6" rx="1" fill="#808000"/><rect x="14" y="20" width="4" height="3" fill="#ffffc0"/></svg>';
var computerSVG = '<svg width="32" height="32" viewBox="0 0 32 32"><rect x="3" y="4" width="26" height="18" rx="1" fill="#c0c0c0" stroke="#404040"/><rect x="5" y="6" width="22" height="14" fill="#000080"/><rect x="10" y="23" width="12" height="2" fill="#c0c0c0" stroke="#404040" stroke-width="0.5"/><rect x="7" y="25" width="18" height="3" rx="1" fill="#c0c0c0" stroke="#404040" stroke-width="0.5"/></svg>';
var recycleSVG = '<svg width="32" height="32" viewBox="0 0 32 32"><path d="M8 10H24L22 28H10L8 10Z" fill="#c0c0c0" stroke="#404040"/><rect x="11" y="6" width="10" height="4" fill="#c0c0c0" stroke="#404040"/><rect x="6" y="9" width="20" height="2" fill="#c0c0c0" stroke="#404040"/><line x1="13" y1="13" x2="13" y2="25" stroke="#808080"/><line x1="16" y1="13" x2="16" y2="25" stroke="#808080"/><line x1="19" y1="13" x2="19" y2="25" stroke="#808080"/></svg>';

function updateClock() {
  var now = new Date();
  document.getElementById('clock').textContent = now.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', hour12: true });
}
updateClock(); setInterval(updateClock, 30000);

function renderDesktop() {
  var desktop = document.getElementById('desktop');
  var html = '';

  // Video icons on the left
  VIDEOS.forEach(function(v, i) {
    var top = 20 + i * 80;
    var iconStyle = '';
    var labelStyle = '';
    if (v.id === 'v3') labelStyle = ' style="transform:translateX(-10px)"';
    html += '<div class="desktop-icon" id="dicon-' + v.id + '" style="left:20px;top:' + top + 'px" ' +
      'ondblclick="openVideo(\'' + v.id + '\')" ontouchend="event.preventDefault();openVideo(\'' + v.id + '\')">' +
      '<div class="icon-wrap"' + iconStyle + '>' + videoSVG + '</div>' +
      '<div class="icon-label"' + labelStyle + '>' + v.name + '</div></div>';
  });

  // photography.zip icon
  var zipTop = 20 + VIDEOS.length * 80;
  html += '<div class="desktop-icon" style="left:20px;top:' + zipTop + 'px" ' +
    'ondblclick="window.open(PHOTOGRAPHY_URL, \'_blank\')" ontouchend="event.preventDefault();window.open(PHOTOGRAPHY_URL, \'_blank\')">' +
    '<div class="icon-wrap">' + zipSVG + '</div>' +
    '<div class="icon-label">photography.zip</div></div>';

  desktop.innerHTML = html;
}

function bringToFront(windowId) {
  zCounter++;
  var el = document.getElementById(windowId);
  if (el) el.style.zIndex = zCounter;
  activeWindowId = windowId;
  updateTaskbar();
}

function getWindowSize() {
  if (isMobile()) {
    var w = window.innerWidth - 8;
    var videoH = Math.round(w * 9 / 16);
    var totalH = videoH + 100;
    var y = Math.round(((window.innerHeight || document.documentElement.clientHeight) - 48 - totalH) / 2);
    if (y < 4) y = 4;
    return { w: w, h: totalH, x: 4, y: y };
  }
  var n = Object.keys(openWindows).length;
  return { w: 660, h: 500, x: 140 + n * 25, y: 50 + n * 25 };
}

function openVideo(videoId) {
  var windowId = 'win-' + videoId;
  if (openWindows[windowId]) { bringToFront(windowId); return; }
  var video = VIDEOS.find(function(v) { return v.id === videoId; });
  if (!video) return;
  var sz = getWindowSize();

  var h = '<div class="window" id="' + windowId + '" style="left:' + sz.x + 'px;top:' + sz.y + 'px;width:' + sz.w + 'px;height:' + sz.h + 'px;z-index:' + (++zCounter) + '" onmousedown="bringToFront(\'' + windowId + '\')">' +
    '<div class="title-bar" onmousedown="startDrag(event,\'' + windowId + '\')" ontouchstart="startDragTouch(event,\'' + windowId + '\')">' +
    '<div class="drag-handle"></div>' + videoSVG +
    '<span class="title-text">' + video.name + ' — Media Player</span>' +
    '<div style="display:flex;gap:2px" onmousedown="event.stopPropagation()" ontouchstart="event.stopPropagation()">' +
    '<button class="win-btn close-btn" onclick="closeWindow(\'' + windowId + '\')" ontouchend="event.preventDefault();closeWindow(\'' + windowId + '\')">✕</button></div></div>' +
    '<div class="player-area"><video id="vid-' + videoId + '" src="' + video.url + '" playsinline webkit-playsinline style="max-width:100%;max-height:100%" ontimeupdate="updateProgress(\'' + videoId + '\')" onended="onVideoEnd(\'' + videoId + '\')"></video></div>' +
    '<div class="player-controls">' +
    '<button class="win-btn" onclick="playVideo(\'' + videoId + '\')">▶</button>' +
    '<button class="win-btn" onclick="pauseVideo(\'' + videoId + '\')">⏸</button>' +
    '<button class="win-btn" onclick="stopVideo(\'' + videoId + '\')">⏹</button>' +
    '<div class="progress-track" id="track-' + videoId + '" onclick="seekVideo(event,\'' + videoId + '\')" ontouchstart="seekVideoTouch(event,\'' + videoId + '\')">' +
    '<div class="progress-fill" id="progress-' + videoId + '"></div></div>' +
    '<div class="time-display" id="time-' + videoId + '">0:00 / 0:00</div>' +
    '<button class="win-btn" onclick="toggleFullscreen(\'' + videoId + '\')">⛶</button></div>' +
    '</div>';

  document.getElementById('windows').insertAdjacentHTML('beforeend', h);
  openWindows[windowId] = { name: video.name };
  bringToFront(windowId);
  updateTaskbar();
}

function closeWindow(windowId) {
  var el = document.getElementById(windowId);
  if (el) el.remove();
  delete openWindows[windowId];
  var m = windowId.match(/win-(.*)/);
  if (m) { var vid = document.getElementById('vid-' + m[1]); if (vid) vid.pause(); }
  updateTaskbar();
}

function playVideo(id) { var v = document.getElementById('vid-' + id); if (v) v.play(); }
function pauseVideo(id) { var v = document.getElementById('vid-' + id); if (v) v.pause(); }
function stopVideo(id) { var v = document.getElementById('vid-' + id); if (v) { v.pause(); v.currentTime = 0; } }
function toggleFullscreen(id) {
  var v = document.getElementById('vid-' + id);
  if (v) { if (v.requestFullscreen) v.requestFullscreen(); else if (v.webkitRequestFullscreen) v.webkitRequestFullscreen(); else if (v.webkitEnterFullscreen) v.webkitEnterFullscreen(); }
}
function formatTime(s) { if (isNaN(s)) return '0:00'; return Math.floor(s/60) + ':' + (Math.floor(s%60)<10?'0':'') + Math.floor(s%60); }
function updateProgress(id) {
  var v = document.getElementById('vid-' + id);
  var fill = document.getElementById('progress-' + id);
  var t = document.getElementById('time-' + id);
  if (v && fill) fill.style.width = (v.duration ? (v.currentTime/v.duration)*100 : 0) + '%';
  if (v && t) t.textContent = formatTime(v.currentTime) + ' / ' + formatTime(v.duration);
}
function seekVideo(e, id) {
  var track = document.getElementById('track-' + id); var v = document.getElementById('vid-' + id);
  if (track && v && v.duration) { var r = track.getBoundingClientRect(); v.currentTime = Math.max(0,Math.min(1,(e.clientX-r.left)/r.width)) * v.duration; }
}
function seekVideoTouch(e, id) {
  var touch = e.touches[0]; if (!touch) return;
  var track = document.getElementById('track-' + id); var v = document.getElementById('vid-' + id);
  if (track && v && v.duration) { var r = track.getBoundingClientRect(); v.currentTime = Math.max(0,Math.min(1,(touch.clientX-r.left)/r.width)) * v.duration; }
}
function onVideoEnd(id) { var f = document.getElementById('progress-' + id); if (f) f.style.width = '100%'; }

// Drag
var dragState = null;
function startDrag(e, wid) {
  if (e.target.closest('button')) return;
  bringToFront(wid); var el = document.getElementById(wid); var r = el.getBoundingClientRect();
  dragState = { windowId: wid, offsetX: e.clientX - r.left, offsetY: e.clientY - r.top }; e.preventDefault();
}
document.addEventListener('mousemove', function(e) {
  if (!dragState || dragState.isTouch) return;
  var el = document.getElementById(dragState.windowId);
  if (el) { el.style.left = (e.clientX - dragState.offsetX) + 'px'; el.style.top = (e.clientY - dragState.offsetY) + 'px'; }
});
document.addEventListener('mouseup', function() { if (dragState && !dragState.isTouch) dragState = null; });

function startDragTouch(e, wid) {
  if (e.target.closest('button')) return;
  bringToFront(wid); var touch = e.touches[0]; if (!touch) return;
  var el = document.getElementById(wid); var r = el.getBoundingClientRect();
  dragState = { windowId: wid, offsetX: touch.clientX - r.left, offsetY: touch.clientY - r.top, isTouch: true, startX: touch.clientX, startY: touch.clientY, moved: false };
}
document.addEventListener('touchmove', function(e) {
  if (!dragState || !dragState.isTouch) return;
  var touch = e.touches[0]; if (!touch) return;
  if (!dragState.moved && Math.abs(touch.clientX-dragState.startX)<8 && Math.abs(touch.clientY-dragState.startY)<8) return;
  dragState.moved = true; e.preventDefault();
  var el = document.getElementById(dragState.windowId);
  if (el) {
    var nx = touch.clientX - dragState.offsetX, ny = touch.clientY - dragState.offsetY;
    ny = Math.max(-10, Math.min(ny, window.innerHeight-60));
    nx = Math.max(-el.offsetWidth+60, Math.min(nx, window.innerWidth-60));
    el.style.left = nx+'px'; el.style.top = ny+'px';
  }
}, { passive: false });
document.addEventListener('touchend', function() { dragState = null; });

function updateTaskbar() {
  var c = document.getElementById('taskbarItems'); var html = '';
  for (var id in openWindows) {
    html += '<button class="win-btn taskbar-item ' + (id===activeWindowId?'active':'') + '" onclick="bringToFront(\'' + id + '\')">🎬 ' + openWindows[id].name + '</button>';
  }
  c.innerHTML = html;
}

function toggleStart() { startOpen = !startOpen; document.getElementById('start-menu').classList.toggle('open', startOpen); if (!startOpen) { var ds = document.getElementById('docsSubmenu'); if (ds) ds.style.display = 'none'; } }
function toggleDocs() { var ds = document.getElementById('docsSubmenu'); ds.style.display = ds.style.display === 'none' ? 'block' : 'none'; }
function closeStart() { startOpen = false; document.getElementById('start-menu').classList.remove('open'); }

document.body.addEventListener('mousedown', function(e) {
  if (!e.target.closest('.desktop-icon') && !e.target.closest('.start-menu') && !e.target.closest('#startBtn')) closeStart();
});

window.addEventListener('resize', function() {
  if (isMobile()) {
    document.querySelectorAll('.window').forEach(function(w) {
      var sz = getWindowSize();
      w.style.left = sz.x + 'px'; w.style.top = sz.y + 'px';
      w.style.width = sz.w + 'px'; w.style.height = sz.h + 'px';
    });
  }
});

renderDesktop();

// Force background videos to play
document.addEventListener('click', function playOnce() {
  var d = document.getElementById('bgVideoDesktop');
  var m = document.getElementById('bgVideoMobile');
  if (d) d.play().catch(function(){});
  if (m) m.play().catch(function(){});
  document.removeEventListener('click', playOnce);
});
</script>
</body>
